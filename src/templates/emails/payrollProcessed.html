<!DOCTYPE html>
<html>
<head>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; line-height: 1.6; color: #333; }
        .container { max-width: 600px; margin: 0 auto; padding: 20px; border: 1px solid #eee; border-radius: 10px; }
        .header { background: #FF7A00; color: #fff; padding: 20px; text-align: center; border-radius: 10px 10px 0 0; }
        .content { padding: 20px; }
        .amount { font-size: 24px; font-weight: bold; color: #2E7D32; margin: 10px 0; }
        .footer { text-align: center; font-size: 12px; color: #777; margin-top: 20px; }
        .button { display: inline-block; padding: 10px 20px; background: #FF7A00; color: #ffffff !important; text-decoration: none; border-radius: 5px; margin-top: 15px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Salary Credited</h1>
        </div>
        <div class="content">
            <p>Hello {{employeeName}},</p>
            <p>Your salary for <strong>{{month}}</strong> has been credited to your bank account.</p>
            <div class="amount">₹{{salaryAmount}}</div>
            <p>You can download your detailed payslip from the HRMS portal.</p>
            <a href="{{dashboardUrl}}" class="button">View Payslip</a>
            <p>Thank you,<br>The Finance Team</p>
        </div>
        <div class="footer">
            &copy; {{year}} {{companyName}}. All rights reserved.
        </div>
    </div>
</body>
</html>
